name: Generate Daily Puzzles

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC = 14:00 Beijing
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Generate puzzles locally
        run: |
          cd puzzle-generator
          node generate-puzzles-local.js
      
      - name: Commit and push puzzles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update daily puzzles $(date +'%Y-%m-%d')"
          git push