name: Generate Daily Puzzles
on:
  schedule:
    - cron: '0 6 * * *'   # Runs daily at 6 AM UTC = 2 PM Beijing / 11 PM PT
  workflow_dispatch:       # Allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: cd puzzle-generator && npm install
      
      - name: Generate puzzles
        run: cd puzzle-generator && node generate-puzzles.js
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_URL: ${{ secrets.AI_API_URL || 'https://agnes-ai.com/v1/chat/completions' }}
          AI_MODEL: ${{ secrets.AI_MODEL || 'gpt-4o-mini' }}
      
      - name: Commit and push puzzles
        run: |
          git config user.name "WordleLike Bot"
          git config user.email "bot@wordlelike.com"
          git add data/
          git diff --staged --quiet || (git commit -m "Daily puzzle update $(date +%Y-%m-%d)" && git push)
